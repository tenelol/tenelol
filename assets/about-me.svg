<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }
      .border { stroke: #222222; stroke-width: 1; }
      .text-base { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #a0a0a0; }
      .key { fill: #E74C3C; font-weight: bold; }
      .string { fill: #cccccc; }

      @keyframes type {
        from { width: 0; }
        to { width: 100%; }
      }
      
      @keyframes blink {
        50% { opacity: 0; }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .line {
        overflow: hidden;
        white-space: nowrap;
        opacity: 0;
        animation: fadeIn 0.1s forwards;
      }
      
      .l1 { animation-delay: 0.5s; }
      .l2 { animation-delay: 1.0s; }
      .l3 { animation-delay: 1.5s; }
      .l4 { animation-delay: 2.0s; }
      .l5 { animation-delay: 2.5s; }
      .l6 { animation-delay: 3.0s; }
      .l7 { animation-delay: 3.5s; }
      .l8 { animation-delay: 4.0s; }
      
      .cursor {
        fill: #C0392B;
        opacity: 0;
        animation: fadeIn 0.1s forwards 4.5s, blink 1s step-start infinite 4.5s;
      }
    </style>
  </defs>

  <!-- Terminal Window Background -->
  <rect x="0" y="0" width="800" height="240" rx="6" class="bg border"/>
  
  <!-- Terminal Header -->
  <path d="M 0 6 Q 0 0 6 0 L 794 0 Q 800 0 800 6 L 800 24 L 0 24 Z" fill="#151515" class="border"/>
  
  <!-- Mac-style buttons but in crimson/grey theme -->
  <circle cx="20" cy="12" r="5" fill="#333333"/>
  <circle cx="38" cy="12" r="5" fill="#333333"/>
  <circle cx="56" cy="12" r="5" fill="#C0392B"/>
  
  <text x="400" y="16" font-family="'Courier New', Courier, monospace" font-size="12" fill="#555555" text-anchor="middle">about_me.yml</text>

  <!-- YAML Content (Animated line by line) -->
  <g transform="translate(24, 54)" class="text-base">
    <!-- Using foreignObject to allow CSS clip/width animation on text, or we can just fade lines in sequence for cross-browser compat -->
    <text y="0" class="line l1"><tspan class="key">name</tspan>: <tspan class="string">"tenelol"</tspan></text>
    <text y="24" class="line l2"><tspan class="key">location</tspan>: <tspan class="string">"🇯🇵 Japan"</tspan></text>
    <text y="48" class="line l3"><tspan class="key">website</tspan>: <tspan class="string">"https://tenelol.dev"</tspan></text>
    
    <text y="72" class="line l4"><tspan class="key">current_focus</tspan>:</text>
    <text y="96" x="16" class="line l5">- <tspan class="string">"🔭 Building something awesome"</tspan></text>
    <text y="120" x="16" class="line l6">- <tspan class="string">"🌱 Always learning new things"</tspan></text>
    <text y="144" x="16" class="line l7">- <tspan class="string">"🎮 Creating fun projects"</tspan></text>
    
    <text y="168" class="line l8"><tspan class="key">philosophy</tspan>: <tspan class="string">"Übermensch"</tspan></text>
    
    <!-- Blinking cursor at the end, appears after last line -->
    <rect x="230" y="156" width="8" height="15" class="cursor" />
  </g>
</svg>
