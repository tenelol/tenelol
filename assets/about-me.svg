<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }
      .border { stroke: #222222; stroke-width: 1; }
      .text-base { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #a0a0a0; }
      .key { fill: #E74C3C; font-weight: bold; }
      .string { fill: #cccccc; }
      .comment { fill: #555555; font-style: italic; }
      .cursor { fill: #C0392B; }
    </style>
  </defs>

  <!-- Terminal Window Background -->
  <rect x="0" y="0" width="800" height="240" rx="6" class="bg border"/>
  
  <!-- Terminal Header -->
  <path d="M 0 6 Q 0 0 6 0 L 794 0 Q 800 0 800 6 L 800 24 L 0 24 Z" fill="#151515" class="border"/>
  
  <!-- Mac-style buttons but in crimson/grey theme -->
  <circle cx="20" cy="12" r="5" fill="#333333"/>
  <circle cx="38" cy="12" r="5" fill="#333333"/>
  <circle cx="56" cy="12" r="5" fill="#C0392B"/>
  
  <text x="400" y="16" font-family="'Courier New', Courier, monospace" font-size="12" fill="#555555" text-anchor="middle">about_me.yml</text>

  <!-- YAML Content -->
  <g transform="translate(24, 54)" class="text-base">
    <text y="0"><tspan class="key">name</tspan>: <tspan class="string">"tenelol"</tspan></text>
    <text y="24"><tspan class="key">location</tspan>: <tspan class="string">"🇯🇵 Japan"</tspan></text>
    <text y="48"><tspan class="key">website</tspan>: <tspan class="string">"https://tenelol.dev"</tspan></text>
    
    <text y="72"><tspan class="key">current_focus</tspan>:</text>
    <text y="96" x="16">- <tspan class="string">"🔭 Building something awesome"</tspan></text>
    <text y="120" x="16">- <tspan class="string">"🌱 Always learning new things"</tspan></text>
    <text y="144" x="16">- <tspan class="string">"🎮 Creating fun projects"</tspan></text>
    
    <text y="168"><tspan class="key">philosophy</tspan>: <tspan class="string">"Übermensch"</tspan></text>
    
    <!-- Blinking cursor at the end -->
    <rect x="230" y="156" width="8" height="15" class="cursor">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
