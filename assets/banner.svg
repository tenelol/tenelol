<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E8EAED"/>
      <stop offset="100%" stop-color="#AABBCC"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2980B9" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2980B9"/>
      <stop offset="80%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2980B9" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <style>
      @keyframes float1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes float2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }
      @keyframes blink { 0%,100% { opacity: 0.9; } 50% { opacity: 0; } }
      @keyframes pulse { 0%,100% { opacity: 0.03; } 50% { opacity: 0.08; } }
      @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(1200px); } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Accent lines top & bottom -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#lineGrad)"/>

  <!-- Floating particles -->
  <circle cx="150" cy="80" r="1.5" fill="#2980B9" opacity="0.4" style="animation: float1 4s ease-in-out infinite"/>
  <circle cx="350" cy="220" r="1" fill="#3498DB" opacity="0.3" style="animation: float2 5s ease-in-out infinite"/>
  <circle cx="550" cy="60" r="2" fill="#2980B9" opacity="0.25" style="animation: float1 6s ease-in-out infinite 1s"/>
  <circle cx="850" cy="240" r="1.5" fill="#3498DB" opacity="0.35" style="animation: float2 4.5s ease-in-out infinite 0.5s"/>
  <circle cx="1050" cy="100" r="1" fill="#2980B9" opacity="0.3" style="animation: float1 5.5s ease-in-out infinite 2s"/>
  <circle cx="700" cy="180" r="1.8" fill="#3498DB" opacity="0.2" style="animation: float2 7s ease-in-out infinite"/>
  <circle cx="250" cy="150" r="1.2" fill="#2980B9" opacity="0.15" style="animation: float1 8s ease-in-out infinite 3s"/>
  <circle cx="950" cy="50" r="2" fill="#3498DB" opacity="0.2" style="animation: float2 6s ease-in-out infinite 1.5s"/>

  <!-- Radial light behind name -->
  <circle cx="600" cy="130" r="200" fill="#2980B9" opacity="0.03" style="animation: pulse 4s ease-in-out infinite"/>

  <!-- Prompt top-left -->
  <text x="36" y="44" font-family="'Courier New', Courier, monospace" font-size="13" fill="#2980B9" opacity="0.5" filter="url(#glow)">root@tenelol:~$</text>
  <text x="190" y="44" font-family="'Courier New', Courier, monospace" font-size="13" fill="#607080" opacity="0.4">neofetch</text>

  <!-- Big faint background characters -->
  <text x="20" y="250" font-family="monospace" font-size="200" fill="#2980B9" opacity="0.03" font-weight="bold">{</text>
  <text x="1020" y="250" font-family="monospace" font-size="200" fill="#2980B9" opacity="0.03" font-weight="bold">}</text>

  <!-- Main name -->
  <text x="600" y="155" font-family="'Courier New', Courier, monospace" font-size="84" font-weight="900" fill="url(#nameGrad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="16" filter="url(#glow)">tenelol</text>

  <!-- Blinking cursor -->
  <rect x="895" y="118" width="14" height="72" rx="2" fill="#2980B9" opacity="0.9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="600" y="210" font-family="'Courier New', Courier, monospace" font-size="16" fill="#2980B9" text-anchor="middle" letter-spacing="8" filter="url(#glow)">tenelol.dev</text>

  <!-- Decorative corner brackets -->
  <path d="M 30 270 L 30 280 L 50 280" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.2"/>
  <path d="M 1170 270 L 1170 280 L 1150 280" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.2"/>
  <path d="M 30 30 L 30 20 L 50 20" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.2"/>
  <path d="M 1170 30 L 1170 20 L 1150 20" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.2"/>

  <!-- Bottom-right label -->
  <text x="1165" y="272" font-family="'Courier New', monospace" font-size="11" fill="#2980B9" opacity="0.25" text-anchor="end" filter="url(#glow)">// übermensch</text>
</svg>
