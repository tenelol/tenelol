<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06060F"/>
      <stop offset="100%" stop-color="#000814"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2980B9" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#2980B9"/>
      <stop offset="80%"  stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CCCCCC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="70"  x2="1200" y2="70"  stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="140" x2="1200" y2="140" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="300" y1="0" x2="300" y2="280" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="280" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="900" y1="0" x2="900" y2="280" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Top & bottom accent lines -->
  <rect x="0" y="0"   width="1200" height="3" fill="url(#lineGrad)"/>
  <rect x="0" y="277" width="1200" height="3" fill="url(#lineGrad)"/>

  <!-- Floating terminal prompt top-left -->
  <text x="36" y="50" font-family="'Courier New', Courier, monospace" font-size="14" fill="#2980B9" opacity="0.7">root@tenelol:~$</text>

  <!-- Big faint background character -->
  <text x="20" y="230" font-family="monospace" font-size="180" fill="#2980B9" opacity="0.05" font-weight="bold">&gt;</text>
  <text x="1010" y="230" font-family="monospace" font-size="180" fill="#2980B9" opacity="0.05" font-weight="bold">_</text>

  <!-- Main name -->
  <text
    x="600" y="148"
    font-family="'Courier New', Courier, monospace"
    font-size="82"
    font-weight="900"
    fill="url(#nameGrad)"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="14">tenelol</text>

  <!-- Blinking cursor after name -->
  <rect x="892" y="110" width="14" height="76" fill="#2980B9" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Website URL -->
  <text
    x="600" y="215"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    fill="#2980B9"
    text-anchor="middle"
    letter-spacing="6">tenelol.dev</text>

  <!-- Bottom-right label -->
  <text x="1165" y="260" font-family="'Courier New', monospace" font-size="11" fill="#3a3a3a" text-anchor="end">// übermensch</text>
</svg>
