<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 12" width="1200" height="12">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2980B9" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#2980B9" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#3498DB" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#2980B9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2980B9" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="4" width="1200" height="1" fill="url(#g)" filter="url(#gl)"/>
  <rect x="0" y="5" width="1200" height="1" fill="url(#g)" opacity="0.3"/>
  <!-- Center diamond -->
  <rect x="596" y="2" width="8" height="8" rx="1" fill="#3498DB" opacity="0.5" transform="rotate(45 600 6)" filter="url(#gl)"/>
</svg>
