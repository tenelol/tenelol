<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2980B9" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2980B9"/>
      <stop offset="80%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="80" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="1" fill="url(#line)" filter="url(#gl)"/>

  <!-- Corner brackets -->
  <path d="M 30 60 L 30 65 L 50 65" fill="none" stroke="#2980B9" stroke-width="0.8" opacity="0.2"/>
  <path d="M 1170 60 L 1170 65 L 1150 65" fill="none" stroke="#2980B9" stroke-width="0.8" opacity="0.2"/>

  <text x="600" y="42" font-family="'Courier New', monospace" font-size="13" fill="#2980B9" opacity="0.4" text-anchor="middle" letter-spacing="4" filter="url(#gl)">「最高のものを作ろう」</text>
  <text x="600" y="62" font-family="'Courier New', monospace" font-size="11" fill="#555b66" opacity="0.35" text-anchor="middle" letter-spacing="2">// built by tenelol</text>
</svg>
