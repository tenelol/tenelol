<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }
      .border { stroke: #222222; stroke-width: 1; }
      .text-base { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #a0a0a0; }
      .category { fill: #E74C3C; font-weight: bold; }
      .item { fill: #cccccc; }
      .dot { fill: #555555; }
    </style>
  </defs>

  <!-- Terminal Window Background -->
  <rect x="0" y="0" width="800" height="240" rx="6" class="bg border"/>
  
  <!-- Terminal Header -->
  <path d="M 0 6 Q 0 0 6 0 L 794 0 Q 800 0 800 6 L 800 24 L 0 24 Z" fill="#151515" class="border"/>
  
  <!-- Mac-style buttons in crimson/grey theme -->
  <circle cx="20" cy="12" r="5" fill="#333333"/>
  <circle cx="38" cy="12" r="5" fill="#333333"/>
  <circle cx="56" cy="12" r="5" fill="#C0392B"/>
  
  <text x="400" y="16" font-family="'Courier New', Courier, monospace" font-size="12" fill="#555555" text-anchor="middle">tech_stack.sh</text>

  <!-- Terminal Content -->
  <g transform="translate(24, 54)" class="text-base">
    <text y="0" class="category">root@tenelol:~# ./show_stack</text>
    
    <text y="36" class="category">[Languages]</text>
    <text y="60" x="16"><tspan class="dot">></tspan> <tspan class="item">JavaScript    (ES6+)</tspan></text>
    <text y="84" x="16"><tspan class="dot">></tspan> <tspan class="item">Nix           (NixOS / flakes)</tspan></text>

    <!-- Column 2 (Frontend) -->
    <text y="36" x="350" class="category">[Frontend]</text>
    <text y="60" x="366"><tspan class="dot">></tspan> <tspan class="item">Tailwind CSS  (Utility-first)</tspan></text>
    <text y="84" x="366"><tspan class="dot">></tspan> <tspan class="item">DaisyUI       (Component lib)</tspan></text>

    <!-- Next row (Tools) -->
    <text y="140" class="category">[Tools &amp; Environment]</text>
    <text y="164" x="16"><tspan class="dot">></tspan> <tspan class="item">Linux         (Daily driver)</tspan></text>
    <text y="188" x="16"><tspan class="dot">></tspan> <tspan class="item">Git           (Version control)</tspan></text>
    <text y="212" x="16"><tspan class="dot">></tspan> <tspan class="item">SQLite        (Local db)</tspan></text>

    <text y="188" x="350" class="dot">Loading modules...</text>
    <text y="188" x="494" class="category">
      <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
      [OK]
    </text>
  </g>
</svg>
